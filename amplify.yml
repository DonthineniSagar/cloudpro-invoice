version: 1
backend:
  phases:
    build:
      commands:
        - nvm install 24
        - nvm use 24
        - npm cache clean --force
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24
    build:
      commands:
        - npm run build --legacy-peer-deps
        - echo "Build completed, checking directories:"
        - ls -la
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
