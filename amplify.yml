# This file is used to configure the build settings for AWS Amplify
version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - npm ci
    build:
      commands:
        - npm run build --legacy-peer-deps
        - echo "Build completed, checking directories:"
        - ls -la
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
